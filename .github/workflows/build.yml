name: Build Flatpak

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:kde-5.15-23.08
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: qnapi.flatpak
          manifest-path: io.github.qnapi.QNapi.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.2.3-build${{ github.run_number }}
          name: QNapi 0.2.3 (build ${{ github.run_number }})
          body: |
            Flatpak build of QNapi 0.2.3.

            **Install:**
            ```bash
            flatpak install qnapi.flatpak
            flatpak run io.github.qnapi.QNapi
            ```

            Bundled: 7-zip 26.00 static binary (`/app/bin/7z`)
          files: qnapi-x86_64.flatpak/qnapi.flatpak
          make_latest: true
