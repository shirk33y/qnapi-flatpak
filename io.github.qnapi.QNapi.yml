app-id: io.github.qnapi.QNapi
runtime: org.kde.Platform
runtime-version: '5.15-23.08'
sdk: org.kde.Sdk
command: qnapi
finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --filesystem=home
  - --device=dri

modules:
  - name: libzen
    buildsystem: cmake-ninja
    subdir: Project/CMake
    sources:
      - type: archive
        url: https://github.com/MediaArea/ZenLib/archive/refs/tags/v0.4.41.tar.gz
        sha256: 45d5173fa0278f5264daa6836ae297aa303984482227d00b35c4f03929494c8f

  - name: libmediainfo
    buildsystem: cmake-ninja
    subdir: Project/CMake
    sources:
      - type: archive
        url: https://github.com/MediaArea/MediaInfoLib/archive/refs/tags/v23.11.tar.gz
        sha256: 283dd5608b72fb21cfbf1ce55f6bb803ba5987e1cf38f2c0b8ff11b1864d1edb

  - name: qnapi
    buildsystem: qmake
    config-opts:
      - CONFIG+=release
    post-install:
      - install -Dm644 doc/qnapi.desktop /app/share/applications/io.github.qnapi.QNapi.desktop
      - desktop-file-edit --set-key=Icon --set-value=io.github.qnapi.QNapi /app/share/applications/io.github.qnapi.QNapi.desktop
      - install -Dm644 gui/res/icons/16x16/apps/qnapi.png /app/share/icons/hicolor/16x16/apps/io.github.qnapi.QNapi.png
      - install -Dm644 gui/res/icons/32x32/apps/qnapi.png /app/share/icons/hicolor/32x32/apps/io.github.qnapi.QNapi.png
      - install -Dm644 gui/res/icons/48x48/apps/qnapi.png /app/share/icons/hicolor/48x48/apps/io.github.qnapi.QNapi.png
      - install -Dm644 gui/res/icons/128x128/apps/qnapi.png /app/share/icons/hicolor/128x128/apps/io.github.qnapi.QNapi.png
      - install -Dm644 gui/res/icons/512x512/apps/qnapi.png /app/share/icons/hicolor/512x512/apps/io.github.qnapi.QNapi.png
    sources:
      - type: archive
        url: https://github.com/QNapi/qnapi/archive/refs/tags/0.2.3.tar.gz
        sha256: c0f4dfdef653a6c6eb90e110a85b6cf41e03d9dc91c3a0cbd48e498d3dcb3729
      - type: patch
        path: 0001-fix-missing-QIcon-include-for-Qt-5.15.patch
      - type: archive
        url: https://github.com/wiedi/libmaia/archive/e930451632ed7532a5a3ca231669bfb00a3ebb9e.tar.gz
        sha256: edb8e7a97b9faa61dc2b3cbb13b337fbb56c6637e5bd19579588c3f64edef585
        dest: deps/libmaia
        strip-components: 1
      - type: archive
        url: https://github.com/QNapi/qt-maybe/archive/52b21af10535d781a2eef8c0f5874d14a64eedcc.tar.gz
        sha256: bccc49658648ab5e755a6584d8ee8f3e374c4f152de45e48bb4cc6decdc8f654
        dest: deps/qt-maybe
        strip-components: 1
