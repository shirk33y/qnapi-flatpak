app-id: io.github.qnapi.QNapi
runtime: org.kde.Platform
runtime-version: '5.15-23.08'
sdk: org.kde.Sdk
command: qnapi
finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --filesystem=home
  - --device=dri

modules:
  - name: libzen
    buildsystem: cmake-ninja
    subdir: Project/CMake
    sources:
      - type: archive
        url: https://mediaarea.net/download/source/libzen/0.4.41/libzen_0.4.41.tar.bz2
        sha256: eb237d7d3dca6dc6ba068719420a27de0934a783ccaeb2867562b35af3901e2d

  - name: libmediainfo
    buildsystem: cmake-ninja
    subdir: Project/CMake
    sources:
      - type: archive
        url: https://mediaarea.net/download/source/libmediainfo/23.11/libmediainfo_23.11.tar.bz2
        sha256: 444d1001601921eb99a7738ac02937ccc743fcd82878ae5b4a67320986af6441

  - name: qnapi
    buildsystem: qmake
    config-opts:
      - CONFIG+=release
    post-install:
      - install -Dm644 doc/qnapi.desktop /app/share/applications/io.github.qnapi.QNapi.desktop
      - desktop-file-edit --set-key=Icon --set-value=io.github.qnapi.QNapi /app/share/applications/io.github.qnapi.QNapi.desktop
      - install -Dm644 gui/res/icons/16x16/apps/qnapi.png /app/share/icons/hicolor/16x16/apps/io.github.qnapi.QNapi.png
      - install -Dm644 gui/res/icons/32x32/apps/qnapi.png /app/share/icons/hicolor/32x32/apps/io.github.qnapi.QNapi.png
      - install -Dm644 gui/res/icons/48x48/apps/qnapi.png /app/share/icons/hicolor/48x48/apps/io.github.qnapi.QNapi.png
      - install -Dm644 gui/res/icons/128x128/apps/qnapi.png /app/share/icons/hicolor/128x128/apps/io.github.qnapi.QNapi.png
      - install -Dm644 gui/res/icons/512x512/apps/qnapi.png /app/share/icons/hicolor/512x512/apps/io.github.qnapi.QNapi.png
    sources:
      - type: archive
        url: https://github.com/QNapi/qnapi/archive/refs/tags/v0.2.3.tar.gz
        sha256: d5558cd419c8d46bdc958064cb97f963d1ea793866414c025906ec15033512ed
